apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradewisenexus-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tradewisenexus-mysql
  template:
    metadata:
      labels:
        app: tradewisenexus-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: Vaidehi@123
            - name: MYSQL_DATABASE
              value: tradewisenexusdb
