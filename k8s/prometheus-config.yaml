apiVersion: v1
kind: ConfigMap
metadata:
  name: tradewisenexus-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'tradewisenexus-backend'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['tradewisenexus-backend-service:8087']
