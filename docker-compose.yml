services:
  tradewisenexus-mysql:
    image: mysql:8.0
    container_name: tradewisenexus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Vaidehi@123
      MYSQL_DATABASE: tradewisenexusdb
    ports:
      - "3311:3306"
    volumes:
      - tradewisenexus_mysql_data:/var/lib/mysql
    networks:
      - tradewisenexus-network

  tradewisenexus-backend:
    build:
      context: ./backend
    container_name: tradewisenexus-backend
    restart: unless-stopped
    depends_on:
      - tradewisenexus-mysql
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3311/tradewisenexusdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Vaidehi@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8087
    networks:
      - tradewisenexus-network

  tradewisenexus-frontend:
    build:
      context: ./frontend
    container_name: tradewisenexus-frontend
    restart: unless-stopped
    depends_on:
      - tradewisenexus-backend
    ports:
      - "8100:80"
    networks:
      - tradewisenexus-network


  tradewisenexus-prometheus:
    image: prom/prometheus:latest
    container_name: tradewisenexus-prometheus
    restart: unless-stopped
    ports:
      - "9097:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - tradewisenexus-network

  tradewisenexus-grafana:
    image: grafana/grafana:latest
    container_name: tradewisenexus-grafana
    restart: unless-stopped
    ports:
      - "3007:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - tradewisenexus-network

volumes:
  tradewisenexus_mysql_data:

networks:
  tradewisenexus-network:
    driver: bridge
